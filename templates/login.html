<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: "Segoe UI", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: bgMove 6s ease-in-out infinite alternate;
        }

        @keyframes bgMove {
            from { background-position: left; }
            to { background-position: right; }
        }

        .login-box {
            background: rgba(255, 255, 255, 0.95);
            width: 360px;
            padding: 32px;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.25);
            backdrop-filter: blur(6px);
            animation: slideUp 0.6s ease;
        }

        @keyframes slideUp {
            from {
                transform: translateY(30px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .login-box h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #333;
            letter-spacing: 0.5px;
        }

        label {
            font-weight: 500;
            color: #444;
            font-size: 14px;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 11px;
            margin-top: 6px;
            margin-bottom: 18px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 2px rgba(102, 126, 234, 0.2);
        }

        button {
            width: 100%;
            padding: 11px;
            background: linear-gradient(135deg, #667eea, #5a67d8);
            border: none;
            color: #fff;
            font-size: 15px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.25);
        }

        .error {
            background: #ffeaea;
            color: #c0392b;
            padding: 9px;
            border-radius: 8px;
            margin-bottom: 18px;
            text-align: center;
            font-size: 14px;
            border-left: 4px solid #e74c3c;
        }

        .signup {
            text-align: center;
            margin-top: 18px;
            font-size: 14px;
            color: #555;
        }

        .signup a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }

        .signup a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

<!-- HEADER -->
<header style="
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    background: linear-gradient(135deg, #0d6efd, #0dcaf0);
    color: white;
    padding: 15px 1px;
    font-size: 20px;
    font-weight: 600;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 1000;
">
    <div>🚗 Car Assistant</div>
    <div style="font-size:14px;">Used Car Price Prediction</div>
</header>

    <div class="login-box">
        <h2>Login</h2>

        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}

        <form method="POST">
            <label>Username</label>
            <input type="text" name="username" required>

            <label>Password</label>
            <input type="password" name="password" required>

            <button type="submit">Login</button>
        </form>

        <div class="signup">
            New user?
            <a href="{{ url_for('signup') }}">Create account</a>
        </div>
    </div>

</body>

<!-- FOOTER -->
<footer style="
position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    background:linear-gradient(135deg,#198754,#2ecc71);
    color:white;
    text-align:center;
    padding:18px;
    font-size:14px;
    font-weight:500;
">

🚗 Used Car Price Prediction System  
<br>
© 2026 All Rights Reserved

</footer>

</html>
