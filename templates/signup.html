<!DOCTYPE html>
<html>
<head>
    <title>Signup</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1f4037, #99f2c8);
        }

        .signup-card {
            background: white;
            padding: 40px;
            width: 320px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            text-align: center;
            animation: fadeIn 0.5s ease-in-out;
        }

        h2 {
            margin-bottom: 20px;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-top: 5px;
            margin-bottom: 15px;
            border-radius: 10px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        input:focus {
            outline: none;
            border-color: #198754;
            box-shadow: 0 0 5px rgba(25,135,84,0.4);
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 12px;
            background: #198754;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(0,0,0,0.25);
        }

        .error {
            color: red;
            margin-bottom: 10px;
        }

        a {
            color: #198754;
            text-decoration: none;
            font-weight: 500;
        }

        a:hover {
            text-decoration: underline;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

<body>

<!-- HEADER -->
<header style="
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    background: linear-gradient(135deg, #0d6efd, #0dcaf0);
    color: white;
    padding: 15px 1px;
    font-size: 20px;
    font-weight: 600;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 1000;
">
    <div>🚗 Car Assistant</div>
    <div style="font-size:14px;">Used Car Price Prediction</div>
</header>

<div class="signup-card">

    <h2>Create Account</h2>

    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}

    <form method="POST">

        <label>Username:</label><br>
        <input type="text" name="username" required>

        <label>Password:</label><br>
        <input type="password" name="password" required>

        <button type="submit">Signup</button>

    </form>

    <p style="margin-top:15px;">
        Already have account?
        <a href="{{ url_for('login') }}">Login</a>
    </p>

</div>

</body>

<!-- FOOTER -->
<footer style="
position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    background:linear-gradient(135deg,#198754,#2ecc71);
    color:white;
    text-align:center;
    padding:18px;
    font-size:14px;
    font-weight:500;
">

🚗 Used Car Price Prediction System  
<br>
© 2026 All Rights Reserved

</footer>

</html>
