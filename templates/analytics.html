<!DOCTYPE html>
<html>
<head>
    <title>Analytics</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #eef2f7, #d9e4f5);
            min-height: 100vh;
        }

        .analytics-title {
            font-weight: 700;
            color: #2c3e50;
        }

        .analytics-card {
            border: none;
            border-radius: 18px;
            transition: transform 0.25s ease, box-shadow 0.25s ease;
            background: #ffffff;
        }

        .analytics-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 12px 25px rgba(0, 0, 0, 0.15);
        }

        .analytics-icon {
            font-size: 28px;
        }

        .analytics-value {
            font-size: 32px;
            font-weight: bold;
            margin-top: 5px;
            color: #1a1a1a;
        }

        .back-btn {
            border-radius: 12px;
            padding: 10px 20px;
            font-weight: 500;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .analytics-wrapper {
            background: rgba(255, 255, 255, 0.6);
            padding: 30px;
            border-radius: 22px;
            backdrop-filter: blur(6px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
    </style>
</head>

<body>

<!-- HEADER -->
<header style="
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    background: linear-gradient(135deg, #0d6efd, #0dcaf0);
    color: white;
    padding: 15px 25px;
    font-size: 20px;
    font-weight: 600;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 1000;
">
    <div>🚗 Car Assistant</div>
    <div style="font-size:14px;">Used Car Price Prediction</div>
</header>    
    
<div class="container mt-5">

    <div class="analytics-wrapper">
        <h2 class="mb-4 text-center analytics-title">📊 System Analytics (Admin)</h2>

        <div class="row g-4">

            <div class="col-md-3">
                <div class="card analytics-card shadow-sm p-4 text-center">
                    <div class="analytics-icon">👤</div>
                    <h6 class="mt-2">Total Users</h6>
                    <div class="analytics-value">{{ total_users }}</div>
                </div>
            </div>

            <div class="col-md-3">
                <div class="card analytics-card shadow-sm p-4 text-center">
                    <div class="analytics-icon">👑</div>
                    <h6 class="mt-2">Admins</h6>
                    <div class="analytics-value">{{ admin_count }}</div>
                </div>
            </div>

            <div class="col-md-3">
                <div class="card analytics-card shadow-sm p-4 text-center">
                    <div class="analytics-icon">🙋</div>
                    <h6 class="mt-2">Users</h6>
                    <div class="analytics-value">{{ user_count }}</div>
                </div>
            </div>

            <div class="col-md-3">
                <div class="card analytics-card shadow-sm p-4 text-center">
                    <div class="analytics-icon">🚗</div>
                    <h6 class="mt-2">Predictions</h6>
                    <div class="analytics-value">{{ total_predictions }}</div>
                </div>
            </div>

        </div>

        <div class="text-center">
            <a href="{{ url_for('admin') }}" class="btn btn-success mt-4 back-btn">
                ⬅ Back to Admin
            </a>
        </div>
    </div>

</div>

</body>

<!-- FOOTER -->
<footer style="
position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    background:linear-gradient(135deg,#198754,#2ecc71);
    color:white;
    text-align:center;
    padding:18px;
    font-size:14px;
    font-weight:500;
">

🚗 Used Car Price Prediction System  
<br>
© 2026 All Rights Reserved

</footer>

</html>
