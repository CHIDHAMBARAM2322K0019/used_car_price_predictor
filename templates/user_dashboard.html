<!DOCTYPE html>
<html>
<head>
<title>User Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: linear-gradient(135deg, #2b5876, #4e4376);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: "Segoe UI", sans-serif;
}

.dashboard {
    background: white;
    padding: 40px;
    border-radius: 25px;
    width: 95%;
    max-width: 900px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.3);
    animation: fadeIn 0.4s ease;
}

.card {
    border-radius: 18px;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
    box-shadow: 0 10px 25px rgba(0,0,0,0.25);
}

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(10px);}
    to {opacity: 1; transform: translateY(0);}
}
</style>
</head>

<body>

<!-- HEADER -->
<header style="
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    background: linear-gradient(135deg, #0d6efd, #0dcaf0);
    color: white;
    padding: 15px 25px;
    font-size: 20px;
    font-weight: 600;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 1000;
">
    <div>🚗 Car Assistant</div>
    <div style="font-size:14px;">Used Car Price Prediction</div>
</header>

<div class="dashboard">

<h1 class="text-center mb-4">👋 Welcome {{ username }}</h1>

<div class="row g-4">

<div class="col-md-4">
<div class="card p-4 text-center">
<h4>🚗 Prediction App</h4>
<p>Go predict car price</p>
<a href="{{ url_for('home') }}" class="btn btn-success">Open App</a>
</div>
</div>

<div class="col-md-4">
<div class="card p-4 text-center">
<h4>📊 Your Predictions</h4>
<p>Total predictions made</p>
<h2>{{ user_predictions }}</h2>
</div>
</div>

<div class="col-md-4">
<div class="card p-4 text-center">
<h4>🔒 Logout</h4>
<p>Exit safely</p>
<a href="{{ url_for('logout') }}" class="btn btn-danger">Logout</a>
</div>
</div>

</div>

</div>

</body>

<!-- FOOTER -->
<footer style="
position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    background:linear-gradient(135deg,#198754,#2ecc71);
    color:white;
    text-align:center;
    padding:18px;
    font-size:14px;
    font-weight:500;
">

🚗 Used Car Price Prediction System  
<br>
© 2026 All Rights Reserved

</footer>

</html>
